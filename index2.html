<style>

body{
    font-family: Arial, sans-serif;
    margin:0;

}

/* Header */
header{
    background: linear-gradient(to right,#ff8008,#ffc837);
    padding:25px;
    text-align:center;
    color:white;
}
/* Welcome Section */
.welcome{
    text-align:center;
    padding:30px;
}

.welcome img{
    width:50%;              /* Reduced size */
    max-width:400px;        /* Limits the maximum width */
    border-radius:15px;
    border:6px solid;
    border-image: linear-gradient(45deg,#ff512f,#dd2476,#ffcc00,#00c6ff) 1;
    box-shadow:0px 6px 15px rgba(0,0,0,0.3);
    margin-top:10px;
}
.welcome h2{
    margin-top:15px;
    font-size:32px;
    color:#ff4e50;
    background: linear-gradient(to right,#ff512f,#dd2476);
    -webkit-background-clip:text;
    color:transparent;
    font-weight:bold;
}
header h1{
    font-size:40px;
    margin:0;
}

header p{
    font-size:18px;
    font-style:italic;
}

/* Navigation Bar */
nav{
    background-color:#333;
    padding:12px;
    text-align:center;
}

nav a{
    color:white;
    margin:15px;
    text-decoration:none;
    font-size:18px;
    font-weight:bold;
}

nav a:hover{
    color:yellow;
}

/* Content Box */
.box{
    border-radius:10px;
    margin:30px;
    padding:25px;
    background-color:white;
    box-shadow:0px 0px 10px gray;
}

/* Headings */
h2{
    color:#ff6600;
    border-bottom:2px solid #ff6600;
    padding-bottom:5px;
}

/* List */
ul{
    font-size:18px;
    color:#444;
}

li{
    margin:8px 0;
}

/* Video */
video{
    border-radius:10px;
    margin-top:15px;
}

</style>

</head>
