<!DOCTYPE html>

<head>
<title>Tiffin Center Menu</title>

<style>

body{
    font-family: Arial, sans-serif;
    margin:0;
    color:#333;

    /* Animated colorful background */
    background: linear-gradient(270deg,#ff9a9e,#fad0c4,#fbc2eb,#a6c1ee);
    background-size:800% 800%;
    animation:bgAnimation 12s ease infinite;
}

@keyframes bgAnimation{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* Container box */
.container{
    background:rgba(255,255,255,0.9);
    margin:40px;
    padding:30px;
    border-radius:12px;
    box-shadow:0 0 15px gray;
}

/* Headings */
h1{
    text-align:center;
    color:#ff6600;
    text-shadow:2px 2px 5px gray;
}

h2{
    color:#ff6600;
    border-bottom:2px solid #ff6600;
    padding-bottom:5px;
}

/* List styling */
ul{
    font-size:18px;
}

li{
    margin:8px 0;
}

/* Table styling */
table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

th{
    background:#ff6600;
    color:white;
    padding:10px;
}

td{
    text-align:center;
    padding:10px;
    border:1px solid #ccc;
}

tr:hover{
    background:#ffe5cc;
}

/* Image styling */
img{
    border-radius:8px;
}

/* Back button */
a{
    display:inline-block;
    margin-bottom:20px;
    padding:10px 20px;
    background:#333;
    color:white;
    text-decoration:none;
    border-radius:6px;
}

a:hover{
    background:black;
}

</style>

</head>
